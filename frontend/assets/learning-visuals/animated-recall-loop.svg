<svg width="960" height="520" viewBox="0 0 960 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="520" rx="34" fill="#F7F7F7"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="72" y="86" font-size="36" font-weight="900" fill="#1A1A1A">Recall loop</text>
    <text x="74" y="118" font-size="15" fill="#666">read less, retrieve more, review on time</text>
  </g>
  <circle cx="480" cy="278" r="138" stroke="#DCDCDC" stroke-width="24"/>
  <path id="loopPath" d="M480 140A138 138 0 1 1 342 278" stroke="#1E88E5" stroke-width="24" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" values="80 720;420 720;80 720" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M342 278L315 261M342 278L322 304" stroke="#1E88E5" stroke-width="18" stroke-linecap="round"/>
  <g>
    <circle cx="480" cy="140" r="40" fill="#E53935"/>
    <circle cx="618" cy="278" r="40" fill="#FDD835"/>
    <circle cx="480" cy="416" r="40" fill="#1B8B77"/>
    <circle cx="342" cy="278" r="40" fill="#29C5F6"/>
    <animateTransform attributeName="transform" type="rotate" from="0 480 278" to="360 480 278" dur="16s" repeatCount="indefinite"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" text-anchor="middle">
    <text x="480" y="146" fill="white">READ</text>
    <text x="618" y="284" fill="#1A1A1A">TEST</text>
    <text x="480" y="422" fill="white">FIX</text>
    <text x="342" y="284" fill="#1A1A1A">REVIEW</text>
  </g>
</svg>
